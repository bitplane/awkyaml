name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install AWK implementations
        run: sudo apt-get update && sudo apt-get install -y busybox gawk

      - name: Run tests
        run: make test

      - name: Build release assets
        run: |
          make build
          sha256sum build/awkyaml > build/awkyaml.sha256
          sha256sum build/awkyaml-json > build/awkyaml-json.sha256

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" \
              --clobber \
              build/awkyaml#awkyaml \
              build/awkyaml.sha256#awkyaml.sha256 \
              build/awkyaml-json#awkyaml-json \
              build/awkyaml-json.sha256#awkyaml-json.sha256
          else
            gh release create "$TAG_NAME" \
              --verify-tag \
              --title "$TAG_NAME" \
              --generate-notes \
              build/awkyaml#awkyaml \
              build/awkyaml.sha256#awkyaml.sha256 \
              build/awkyaml-json#awkyaml-json \
              build/awkyaml-json.sha256#awkyaml-json.sha256
          fi
