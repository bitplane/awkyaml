name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  lint:
    name: gawk --posix --lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install gawk
        run: sudo apt-get update && sudo apt-get install -y gawk

      - name: POSIX lint the parser
        run: gawk --posix --lint -f src/lib/events.awk -f src/lib/parse-core.awk -f src/lib/parse-tags.awk -f src/lib/parse-scanner.awk -f src/lib/parse-scalar.awk -f src/lib/parse-block-scalar.awk -f src/lib/parse-flow.awk -f src/lib/parse-line.awk -f src/main/awkyaml.awk --source 'BEGIN { yaml_event_read("", yaml_lint_fields) }' </dev/null >/dev/null

  test:
    name: ${{ matrix.awk }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - awk: awk
            runner: awk
          - awk: gawk
            runner: gawk
          - awk: busybox awk
            runner: busybox-awk

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install AWK implementations
        run: sudo apt-get update && sudo apt-get install -y busybox gawk

      - name: Create AWK runners
        run: |
          mkdir -p .ci-bin

          printf '%s\n' \
            '#!/bin/sh' \
            'exec awk "$@"' \
            > .ci-bin/awk

          printf '%s\n' \
            '#!/bin/sh' \
            'exec gawk "$@"' \
            > .ci-bin/gawk

          printf '%s\n' \
            '#!/bin/sh' \
            'exec busybox awk "$@"' \
            > .ci-bin/busybox-awk

          chmod +x .ci-bin/awk .ci-bin/gawk .ci-bin/busybox-awk

      - name: Run tests
        run: make test AWK="./.ci-bin/${{ matrix.runner }}"

  release:
    name: Build release
    runs-on: ubuntu-latest
    needs:
      - lint
      - test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build release assets
        run: |
          make build
          sha256sum build/awkyaml > build/awkyaml.sha256
          sha256sum build/awkyaml-json > build/awkyaml-json.sha256
          sha256sum build/awkyaml-kv > build/awkyaml-kv.sha256

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" \
              --clobber \
              build/awkyaml#awkyaml \
              build/awkyaml.sha256#awkyaml.sha256 \
              build/awkyaml-json#awkyaml-json \
              build/awkyaml-json.sha256#awkyaml-json.sha256 \
              build/awkyaml-kv#awkyaml-kv \
              build/awkyaml-kv.sha256#awkyaml-kv.sha256
          else
            gh release create "$TAG_NAME" \
              --verify-tag \
              --title "$TAG_NAME" \
              --generate-notes \
              build/awkyaml#awkyaml \
              build/awkyaml.sha256#awkyaml.sha256 \
              build/awkyaml-json#awkyaml-json \
              build/awkyaml-json.sha256#awkyaml-json.sha256 \
              build/awkyaml-kv#awkyaml-kv \
              build/awkyaml-kv.sha256#awkyaml-kv.sha256
          fi
